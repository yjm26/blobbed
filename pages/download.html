<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download — Blobbed</title>
</head>
<body class="app-page">

  <header class="app-top">
    <a href="/" class="app-brand">BLOBBED</a>
    <div class="app-top-right">
      <a href="/" class="app-link">Home</a>
    </div>
  </header>

  <main class="app-download">
    <div class="download-header">
      <h1>Shared file</h1>
      <p>Decrypts in your browser</p>
    </div>

    <div id="download-card" class="download-card">
      <div id="preview-slot"></div>
      <div id="file-info" class="file-info hidden">
        <div class="file-name" id="file-name"></div>
      </div>

      <button id="download-btn" class="download-btn" type="button">Download file</button>
    </div>
  </main>

  <script type="module" src="/scripts/download.ts"></script>
</body>
</html>
