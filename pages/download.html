<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download — Blobbed</title>
  <link rel="stylesheet" href="/style.css?v=9">
</head>
<body class="app-page">

  <nav class="app-nav">
    <div class="app-logo">Blobbed</div>
    <a href="/" class="app-nav-link">Home</a>
  </nav>

  <main class="app-download">
    <div class="download-header">
      <h1>Download</h1>
      <p>Decentralized file download</p>
    </div>

    <div id="download-card" class="download-card">
      <div id="file-info" class="file-info hidden">
        <div class="file-name" id="file-name"></div>
        <div class="file-size" id="file-size"></div>
      </div>

      <button id="download-btn" class="download-btn">Download File</button>

      <div id="progress" class="progress hidden">
        <div class="progress-track">
          <div id="progress-bar" class="progress-fill"></div>
        </div>
        <p class="progress-text" id="progress-text">Downloading...</p>
      </div>
    </div>
  </main>

  <script type="module" src="/scripts/download.ts"></script>
</body>
</html>
