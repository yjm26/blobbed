<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drive — Blobbed</title>
</head>
<body class="app-page">

  <header class="app-top">
    <a href="/" class="app-brand">BLOBBED</a>
    <div class="app-top-right">
      <span id="wallet-address" class="wallet-chip" title="Connected wallet"></span>
      <a href="/" class="app-link">Home</a>
      <button type="button" id="disconnect" class="app-link app-link-muted">Disconnect</button>
    </div>
  </header>

  <main class="app-shell">
    <aside class="app-rail">
      <button type="button" id="btn-new-folder" class="app-btn-ghost app-btn-block">New folder</button>
      <button type="button" id="upload-btn" class="app-upload-cta">Upload files</button>
      <nav class="app-rail-nav" aria-label="Library">
        <p class="app-rail-label">Library</p>
        <button type="button" class="app-rail-item is-active" id="nav-root" data-nav="root">All files</button>
        <div id="folder-nav" class="app-folder-nav"></div>
      </nav>
      <p class="app-rail-foot">Library meta on Neon when configured.<br>Blobs on Shelby. Share keys stay in the link fragment.</p>
    </aside>

    <section class="app-stage">
      <div class="app-stage-head">
        <div>
          <button type="button" id="btn-back" class="app-back hidden">← Library</button>
          <h1 class="app-stage-title" id="stage-title">Files</h1>
          <p class="app-stage-sub" id="stage-sub">Your encrypted library</p>
        </div>
        <div class="app-stage-actions">
          <button type="button" id="btn-share-folder" class="app-btn-ghost hidden">Share folder</button>
          <button type="button" id="upload-btn-secondary" class="app-btn-ghost">Upload</button>
        </div>
      </div>

      <div id="drop-zone" class="app-drop" tabindex="0" role="button" aria-label="Drop files to upload">
        <span class="app-drop-title">Drop files here</span>
        <span class="app-drop-hint" id="drop-hint">or click to browse · multi-select ok</span>
      </div>

      <div id="folder-grid" class="drive-folder-grid"></div>
      <div id="file-list" class="app-file-list"></div>
      <div id="empty-state" class="app-empty hidden">
        <p class="app-empty-title">Nothing here yet</p>
        <p class="app-empty-hint">Create a folder for an album, or upload files.</p>
      </div>

      <div id="upload-status" class="app-status hidden" role="status"></div>
    </section>
  </main>

  <input type="file" id="file-input" class="hidden" multiple accept="*/*">

  <script type="module" src="/scripts/dashboard.ts"></script>
</body>
</html>
