<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Blobbed</title>
  <link rel="stylesheet" href="/style.css?v=9">
</head>
<body class="app-page">

  <nav class="app-nav">
    <div class="app-logo">Blobbed</div>
    <div class="app-nav-right">
      <span id="wallet-address" class="wallet-label"></span>
      <a href="/" class="app-nav-link">Home</a>
      <button id="disconnect" class="app-nav-link muted">Disconnect</button>
    </div>
  </nav>

  <main class="app-main">
    <aside class="app-sidebar">
      <button id="upload-btn" class="upload-btn">+ New Upload</button>
      <div class="sidebar-menu">
        <div class="sidebar-label">My Files</div>
        <div class="sidebar-item active">All Files</div>
        <div class="sidebar-item">Shared</div>
      </div>
    </aside>

    <section class="app-content">
      <div id="drop-zone" class="drop-zone hidden">
        <p>Drop files here</p>
      </div>

      <div id="file-list" class="file-list"></div>

      <div id="empty-state" class="empty-state">
        <p>No files yet</p>
        <p class="empty-hint">Upload your first file</p>
      </div>
    </section>
  </main>

  <input type="file" id="file-input" class="hidden">
  <script type="module" src="/scripts/dashboard.ts"></script>
</body>
</html>
